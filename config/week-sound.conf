# Week Sound Configuration
# USB Soundcard Anti-Sleep Service

[audio]
# Frequency of the sine wave in Hz (default: 20, human hearing threshold)
frequency = 20

# Amplitude of the wave (0.0 - 1.0, default: 0.01 for near-silent output)
amplitude = 0.01

[general]
# Path to log file
# Linux: /var/log/week-sound/week-sound.log
# Windows: C:\ProgramData\week-sound\week-sound.log
log_file = /var/log/week-sound/week-sound.log
